services:
  # --- Node.js апп ---
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DB_HOST: db          # db гэдэг нь доорх service-ийн нэр
      DB_USER: root
      DB_PASSWORD: secret
      DB_NAME: demo
    depends_on:
      db:
        condition: service_healthy   # DB бэлэн болсны дараа л апп асна

  # --- MariaDB өгөгдлийн сан ---
  db:
    image: mariadb:11
    environment:
      MARIADB_ROOT_PASSWORD: secret
      MARIADB_DATABASE: demo
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql        # Өгөгдөл container устсан ч хадгалагдана
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  dbdata:
